version: "3.8"

services:
  mawazin-sms:
    image: ghcr.io/abdullahhella/mawazin-sms:latest
    # Or build from source:
    # build: .
    container_name: mawazin-sms
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- Firefly III ---
      FIREFLY_URL: "${FIREFLY_URL}"
      FIREFLY_TOKEN: "${FIREFLY_TOKEN}"

      # --- LLM (Gemma via Ollama OpenAI-compatible endpoint) ---
      LLM_URL: "${LLM_URL}"
      LLM_MODEL: "${LLM_MODEL:-gemma3:4b}"

      # --- Telegram (for batch summaries) ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"

      # --- Auth ---
      INGEST_API_KEY: "${INGEST_API_KEY}"

      # --- Batch config ---
      BATCH_INTERVAL_HOURS: "3"
      DEDUP_WINDOW_DAYS: "7"
      FALLBACK_ACCOUNT_NAME: ""

      # --- Storage ---
      DB_PATH: "/data/mawazin.db"

    volumes:
      - mawazin_data:/data

volumes:
  mawazin_data:
